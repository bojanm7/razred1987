<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Razredna fotografija</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1410;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(101,67,33,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(80,50,20,0.1) 0%, transparent 50%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem;
    font-family: 'EB Garamond', Georgia, serif;
    color: #d4b896;
  }

  .header {
    text-align: center;
    margin-bottom: 1.5rem;
    width: 100%;
  }

  .header-ornament {
    display: flex; align-items: center; gap: 1.2rem;
    justify-content: center; margin-bottom: 0.8rem; color: #8a6840;
  }
  .header-ornament::before { background: linear-gradient(to right, transparent, #8a6840); }
  .header-ornament::after  { background: linear-gradient(to left,  transparent, #8a6840); }
  .header-ornament::before, .header-ornament::after {
    content: ''; flex: 1; max-width: 120px; height: 1px;
  }

  .header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2.2rem; font-weight: 400; color: #e8d5b7;
    letter-spacing: 0.05em; line-height: 1.2;
  }
  .header .subtitle {
    font-size: 1rem; color: #8a6840; letter-spacing: 0.15em;
    text-transform: uppercase; margin-top: 0.4rem; font-style: italic;
  }

  .appeal {
    margin-bottom: 1.5rem;
    padding: 10px 24px;
    border: 1px solid #5a3e20;
    background: rgba(138,104,64,0.08);
    color: #c8a870;
    font-size: 0.92rem;
    text-align: center;
    max-width: 700px;
    line-height: 1.6;
  }
  .appeal strong { color: #e8d5b7; }
  .appeal a { color: #c89840; text-decoration: none; border-bottom: 1px solid rgba(200,152,64,0.4); }
  .appeal a:hover { color: #f0c060; }

  /* ── main two-column layout ── */
  .main-layout {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    width: 100%;
    max-width: 1280px;
  }

  /* ── photo side ── */
  .photo-frame {
    flex: 1 1 auto;
    position: relative;
    display: inline-block;
    padding: 12px;
    background: #2a1f14;
    border: 1px solid #4a3520;
    box-shadow: 0 0 0 1px #1a1008, 0 4px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.4);
  }
  .photo-frame::before {
    content: ''; position: absolute; inset: 5px;
    border: 1px solid rgba(138,104,64,0.2); pointer-events: none; z-index: 1;
  }
  .photo-wrapper { position: relative; display: block; line-height: 0; }
  .photo-wrapper img {
    display: block; width: 100%; height: auto;
    filter: sepia(15%) contrast(1.05);
  }
  .areas-layer { position: absolute; inset: 0; pointer-events: none; }
  .person-area {
    position: absolute; cursor: pointer; pointer-events: all;
    border-radius: 3px; transition: background 0.15s ease;
  }
  .person-area:hover {
    background: rgba(212,184,150,0.18);
    outline: 1.5px solid rgba(212,184,150,0.5);
  }
  .person-area.active {
    background: rgba(212,184,100,0.28);
    outline: 2px solid rgba(220,180,80,0.85);
    animation: pulse 1.8s ease-in-out 2;
  }
  @keyframes pulse {
    0%   { background: rgba(212,184,100,0.28); outline-color: rgba(220,180,80,0.85); }
    50%  { background: rgba(212,184,100,0.48); outline-color: rgba(255,220,80,1); }
    100% { background: rgba(212,184,100,0.28); outline-color: rgba(220,180,80,0.85); }
  }

  /* ── name list side ── */
  .name-list {
    flex: 0 0 380px;
    position: sticky;
    top: 1.5rem;
    max-height: calc(100vh - 3rem);
    display: flex;
    flex-direction: column;
  }

  .name-list h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 400; font-size: 0.95rem; color: #8a6840;
    letter-spacing: 0.12em; text-transform: uppercase;
    text-align: center; margin-bottom: 0.6rem;
    padding-bottom: 0.6rem; border-bottom: 1px solid #3a2a18;
    flex-shrink: 0;
  }

  .names-scroll {
    overflow-y: auto;
    flex: 1;
    /* custom scrollbar */
    scrollbar-width: thin;
    scrollbar-color: #4a3520 #1a1410;
  }
  .names-scroll::-webkit-scrollbar { width: 5px; }
  .names-scroll::-webkit-scrollbar-track { background: #1a1410; }
  .names-scroll::-webkit-scrollbar-thumb { background: #4a3520; border-radius: 3px; }

  .names-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid #3a2a18;
    border-right: none;
    border-bottom: none;
  }
  .name-item {
    padding: 6px 12px;
    font-size: 0.83rem;
    color: #b89870;
    border-bottom: 1px solid #3a2a18;
    transition: background 0.12s ease, color 0.12s ease;
    cursor: pointer;
    line-height: 1.4;
  }
  .name-item:hover { background: rgba(138,104,64,0.15); color: #e8d5b7; }
  .name-item.selected {
    background: rgba(138,104,64,0.25); color: #f0ddb0;
    border-left: 2px solid #c89840;
  }
  .name-item .num { color: #5a4030; font-size: 0.72rem; margin-right: 5px; }

  /* tooltip */
  .tooltip {
    position: fixed; background: #1a1410; border: 1px solid #8a6840;
    color: #e8d5b7; padding: 7px 14px 8px;
    font-family: 'Playfair Display', Georgia, serif; font-size: 0.95rem;
    white-space: nowrap; pointer-events: none; z-index: 9999;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .tooltip.visible { opacity: 1; transform: translateY(0); }

  /* mobile fallback */
  @media (max-width: 700px) {
    .main-layout { flex-direction: column; }
    .name-list { flex: none; position: static; max-height: 300px; width: 100%; }
    .names-grid { flex-direction: row; flex-wrap: wrap; }
    .name-item { flex: 0 0 48%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-ornament">✦</div>
  <h1>Razredna fotografija</h1>
  <p class="subtitle">&nbsp;·&nbsp;Osnovna šola Semič 1987 &nbsp;·&nbsp;</p>
</div>

<div class="appeal">
  Prepoznaš <strong>sošolca 1, 2, 3, 4 ali 5</strong>? Sporoči ime na
  <a href="mailto:macele.bojan@gmail.com">macele.bojan@gmail.com</a>
</div>

<div class="main-layout">

  <div class="photo-frame">
    <div class="photo-wrapper" id="photoWrapper">
      <img src="razred.jpeg" alt="Razredna fotografija" id="photo" draggable="false">
      <div class="areas-layer" id="areasLayer"></div>
    </div>
  </div>

  <div class="name-list">
    <h2>Sošolci</h2>
    <div class="names-scroll">
      <div class="names-grid" id="namesGrid"></div>
    </div>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
const ORIG_W = 1164;
const ORIG_H = 776;

const people = [
  { name: "Robert Jakša",                 x1: 291, y1: 260, x2: 352, y2: 342 },
  { name: "Robert Krašna",                x1: 401, y1: 283, x2: 466, y2: 365 },
  { name: "Aleš Kambič",                  x1: 164, y1: 263, x2: 232, y2: 345 },
  { name: "Dušan Stariha",                x1: 19,  y1: 245, x2: 93,  y2: 323 },
  { name: "Vesna Malnarič",               x1: 548, y1: 259, x2: 621, y2: 341 },
  { name: "Andreja Metelko",              x1: 652, y1: 264, x2: 719, y2: 344 },
  { name: "Karmen Cesar",                 x1: 772, y1: 239, x2: 839, y2: 328 },
  { name: "Mateja Hudak",                 x1: 893, y1: 247, x2: 973, y2: 332 },
  { name: "Jana Kambič",                  x1: 1001,y1: 282, x2: 1063,y2: 353 },
  { name: "Iztok Bukovec",                x1: 43,  y1: 189, x2: 110, y2: 260 },
  { name: "Miha Tomažin",                 x1: 187, y1: 187, x2: 255, y2: 263 },
  { name: "Bojan Macele",                 x1: 270, y1: 162, x2: 326, y2: 244 },
  { name: "Suzana Jakša",                 x1: 424, y1: 183, x2: 469, y2: 246 },
  { name: "Bojan Pavlin",                 x1: 466, y1: 226, x2: 520, y2: 293 },
  { name: "Alenka Mavsar",                x1: 562, y1: 165, x2: 624, y2: 237 },
  { name: "Alenka Majerle",               x1: 654, y1: 149, x2: 718, y2: 230 },
  { name: "Zvonka Kofalt",                x1: 715, y1: 211, x2: 768, y2: 287 },
  { name: "Rada Pašič",                   x1: 775, y1: 141, x2: 832, y2: 217 },
  { name: "Nataša Ramuta",                x1: 829, y1: 191, x2: 883, y2: 267 },
  { name: "Mateja Lukanič",               x1: 880, y1: 160, x2: 943, y2: 234 },
  { name: "Vesna Movern",                 x1: 953, y1: 210, x2: 1028,y2: 283 },
  { name: "Anita Štricelj",               x1: 958, y1: 139, x2: 1019,y2: 206 },
  { name: "Tomaž Majcen",                 x1: 186, y1: 38,  x2: 248, y2: 122 },
  { name: "Dani Simonič",                 x1: 277, y1: 30,  x2: 332, y2: 100 },
  { name: "Jože Fir",                     x1: 420, y1: 50,  x2: 473, y2: 110 },
  { name: "Sandi Štukelj",                x1: 487, y1: 58,  x2: 553, y2: 118 },
  { name: "Jernej Kočevar",               x1: 600, y1: 62,  x2: 648, y2: 140 },
  { name: "Miro Smrekar",                 x1: 634, y1: 37,  x2: 685, y2: 113 },
  { name: "Franci Požek",                 x1: 732, y1: 18,  x2: 793, y2: 76  },
  { name: "Robert Šoštar",                x1: 842, y1: 73,  x2: 898, y2: 136 },
  { name: "Tadeja Fikić",                 x1: 302, y1: 128, x2: 354, y2: 221 },
  { name: "Ana Plut",                     x1: 80,  y1: 155, x2: 143, y2: 239 },
  { name: "Rozika Jerman (razrednik 8b)", x1: 73,  y1: 31,  x2: 144, y2: 106 },
  { name: "Ana Snoj (razrednik 8a)",      x1: 350, y1: 31,  x2: 412, y2: 97  },
  { name: "Stanko Štalcar",               x1: 895, y1: 34,  x2: 952, y2: 97  },
  { name: "Robi Konda",                   x1: 950, y1: 83,  x2: 1010,y2: 137 },
  { name: "Primož Šuštarič",              x1: 704, y1: 90,  x2: 759, y2: 156 },
  { name: "Miro Drganc",                  x1: 761, y1: 65,  x2: 819, y2: 124 },
  { name: "Mateja Drganc",                x1: 508, y1: 118, x2: 563, y2: 185 },
  { name: "Aleš Malnarič",                x1: 375, y1: 104, x2: 424, y2: 162 },
  { name: "Anita Simonič",                x1: 331, y1: 128, x2: 385, y2: 200 },
  { name: "Vili Pečavar",                 x1: 30,  y1: 105, x2: 87,  y2: 175 },
  { name: "Peter Pečavar",                x1: 675, y1: 17,  x2: 733, y2: 81  },
  { name: "Sošolec 1",                      x1: 123, y1: 102, x2: 185, y2: 172 },
  { name: "Sošolec 2",                      x1: 248, y1: 109, x2: 305, y2: 171 },
  { name: "Sošolec 3",                      x1: 424, y1: 126, x2: 471, y2: 174 },
  { name: "Sošolec 4",                      x1: 577, y1: 23,  x2: 634, y2: 93  },
  { name: "Sošolec 5",                      x1: 186, y1: 133, x2: 238, y2: 187 },
];

const photo    = document.getElementById('photo');
const layer    = document.getElementById('areasLayer');
const tooltip  = document.getElementById('tooltip');
const namesGrid = document.getElementById('namesGrid');

let activeArea = null;
let activeNameItem = null;

function highlightPerson(name) {
  if (activeArea) {
    activeArea.classList.remove('active');
    activeArea.style.animation = 'none';
    setTimeout(() => { if (activeArea) activeArea.style.animation = ''; }, 10);
  }
  if (activeNameItem) activeNameItem.classList.remove('selected');

  const area = layer.querySelector(`[data-name="${CSS.escape(name)}"]`);
  if (area) {
    area.classList.remove('active');
    void area.offsetWidth;
    area.classList.add('active');
    activeArea = area;
    // scroll photo into view only on mobile (list is sticky on desktop)
    if (window.innerWidth <= 700)
      area.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  const nameEl = namesGrid.querySelector(`[data-name="${CSS.escape(name)}"]`);
  if (nameEl) {
    nameEl.classList.add('selected');
    activeNameItem = nameEl;
    nameEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

const sorted = [...people].sort((a,b) => a.name.localeCompare(b.name, 'sl'));
sorted.forEach((p, i) => {
  const div = document.createElement('div');
  div.className = 'name-item';
  div.dataset.name = p.name;
  div.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span>${p.name}`;
  div.addEventListener('click', () => highlightPerson(p.name));
  namesGrid.appendChild(div);
});

function buildAreas() {
  layer.innerHTML = '';
  const rect = photo.getBoundingClientRect();
  const scaleX = rect.width / ORIG_W;
  const scaleY = rect.height / ORIG_H;

  people.forEach(p => {
    const el = document.createElement('div');
    el.className = 'person-area';
    el.dataset.name = p.name;
    el.style.left   = (p.x1 * scaleX) + 'px';
    el.style.top    = (p.y1 * scaleY) + 'px';
    el.style.width  = ((p.x2 - p.x1) * scaleX) + 'px';
    el.style.height = ((p.y2 - p.y1) * scaleY) + 'px';

    el.addEventListener('click', () => highlightPerson(p.name));
    el.addEventListener('mouseenter', e => {
      tooltip.textContent = p.name;
      tooltip.classList.add('visible');
      moveTooltip(e);
    });
    el.addEventListener('mousemove', moveTooltip);
    el.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
    layer.appendChild(el);
  });
}

function moveTooltip(e) {
  const offset = 14;
  let x = e.clientX + offset, y = e.clientY - 36;
  const tw = tooltip.offsetWidth || 160, th = tooltip.offsetHeight || 36;
  if (x + tw > window.innerWidth - 8)  x = e.clientX - tw - offset;
  if (y < 8) y = e.clientY + offset;
  if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

photo.addEventListener('load', buildAreas);
if (photo.complete) buildAreas();

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(buildAreas, 60); });
new ResizeObserver(() => { clearTimeout(resizeTimer); resizeTimer = setTimeout(buildAreas, 60); }).observe(photo);
</script>
</body>
</html>
